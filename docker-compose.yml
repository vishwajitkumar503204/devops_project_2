version: "3.8"

services:
  db:
    image: postgres
    container_name: postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devopsdb
    ports:
      - "5432:5432"

  api:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_URL: postgresql://user:password@db:5432/devopsdb

  worker:
    build: ./backend
    container_name: worker
    command: ["python", "app/worker.py"]
    depends_on:
      - db
    environment:
      DB_URL: postgresql://user:password@db:5432/devopsdb

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api