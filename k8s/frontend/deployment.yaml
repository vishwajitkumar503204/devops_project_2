apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vishwajitkumar503/devops_project_2_frontend:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
